<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users</title>
    <link rel="icon" href="/static/media/ratingimages/fullplate.png" type="image/png">
</head>
<body>
    <!-- TEMPORARY FILE TO HELP TEST AND REACH OTHER USERS PROFILES -->
    <h1>All Users</h1>

    <ul>
        {% for user in users %}
            <li>
                {% if user.user_id == current_user_id %}
                    <a href="{{ url_for('profile.profile') }}">{{ user.username }} (You)</a>
                {% else %}
                    <a href="{{ url_for('profile.view_profile', user_id=user.user_id) }}">{{ user.username }}</a>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
