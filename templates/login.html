<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Plated</title>
  <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
</head>
<body>
  <div class="top-bar"></div>

  <main class="auth-container">

    <div class="auth-card">

      <div class="brand">
        <img src="/static/media/ratingimages/fullplate.png" alt="Plated logo">
        <span>Plated</span>
      </div>
      <h2 class="auth-title">Log In</h2>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <p class="auth-error">{{ messages[0] }}</p>
        {% endif %}
      {% endwith %}

      <form class="auth-form" action="/login" method="POST">

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" maxlength="20" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" maxlength="72" required>
        </div>

        <button type="submit" class="auth-button">Log In</button>
        
      </form>


      <p class="auth-switch">Don't have an account? <a href="/register">Sign up</a></p>

    </div>

  </main>
</body>
</html>
