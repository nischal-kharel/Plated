<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>
    <link rel="stylesheet" href="/static/css/navbar.css">
    <link rel="stylesheet" href="/static/css/search.css">
</head>
<body>
{% include 'navbar.html' %}
<main class="search-page">
    <div class="search-layout">

        <section class="results-section">
            <div id="results-grid" class="results-row"></div>
            <p id="no-results" class="no-results-msg" style="display:none">No recipes match your filters.</p>
        </section>

        <aside class="filters-section">
            <h2>Filters:</h2>

            <div class="filter-group">
                <button class="filter-toggle" type="button">
                    <span class="arrow">&gt;</span>
                    Dietary preference
                </button>
                <div class="filter-options">
                    <label><input type="checkbox" class="dietary-cb" value="vegetarian"> Vegetarian</label>
                    <label><input type="checkbox" class="dietary-cb" value="pescatarian"> Pescatarian</label>
                    <label><input type="checkbox" class="dietary-cb" value="lactose-intolerant"> Lactose-Intolerant</label>
                    <label><input type="checkbox" class="dietary-cb" value="nut-free"> Nut-free</label>
                    <label><input type="checkbox" class="dietary-cb" value="gluten-free"> Gluten-free</label>
                </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" type="button">
                    <span class="arrow">&gt;</span>
                    Cook time
                </button>
                <div class="filter-options">
                    <label><input type="checkbox" class="cooktime-cb" value="15"> Under 15 min</label>
                    <label><input type="checkbox" class="cooktime-cb" value="30"> Under 30 min</label>
                    <label><input type="checkbox" class="cooktime-cb" value="60"> Under 1 hour</label>
                </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" type="button">
                    <span class="arrow">&gt;</span>
                    Meal type
                </button>
                <div class="filter-options">
                    <label><input type="checkbox" class="mealtype-cb" value="breakfast"> Breakfast</label>
                    <label><input type="checkbox" class="mealtype-cb" value="lunch"> Lunch</label>
                    <label><input type="checkbox" class="mealtype-cb" value="dinner"> Dinner</label>
                    <label><input type="checkbox" class="mealtype-cb" value="dessert"> Dessert</label>
                </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" type="button">
                    <span class="arrow">&gt;</span>
                    Rating
                </button>
                <div class="filter-options">
                    <label><input type="checkbox" class="rating-cb" value="4"> 4+ plates</label>
                    <label><input type="checkbox" class="rating-cb" value="3"> 3+ plates</label>
                    <label><input type="checkbox" class="rating-cb" value="2"> 2+ plates</label>
                </div>
            </div>
        </aside>

    </div>
</main>

<script src="/static/js/search.js"></script>
</body>
</html>
