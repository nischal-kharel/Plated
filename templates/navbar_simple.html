<nav>
    <div class="logo-body">
        <a href="/">
            <img src="/static/media/ratingimages/fullplate.png" class="logo">
        </a>
        <span class="logo-name">Plated</span>
    </div>

    <ul>
        <li><a href="/login">Sign In</a></li>

    </ul>

    <div class="search-bar">
        <input type="text" id="navSearchInput" placeholder="Search recipes, lists...">
        <span class="search-icon">⌕</span>
    </div>
</nav>
<script>
    document.getElementById('navSearchInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && this.value.trim()) {
            window.location.href = '/search?q=' + encodeURIComponent(this.value.trim());
        }
    });
</script>
