<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Instructions</title>
    <link rel="stylesheet" href="/static/css/instructions.css">
</head>
<body>
<main>
    <div class="instructions-card">

        <div class="card-header">
            <span class="step-indicator" id="stepIndicator">Step 1 of 4</span>
            <span class="close-btn" onclick="history.back()">x</span>
        </div>

        <div class="slider-wrapper">
        <div class="slider-track" id="sliderTrack">

            <!-- step 1: basics -->
            <div class="slide">
                <h2 class="slide-title">Let's start with the basics...</h2>
                <p class="slide-sub">Give us a general idea of your recipe</p>

                <div class="field-group">
                    <label class="field-label">Recipe Name</label>
                    <input type="text" id="recipeName" class="styled-input" placeholder="Give your recipe a name..." maxlength="255">
                </div>

                <div class="field-group">
                    <label class="field-label">Prep?</label>
                    <select id="prepTime" class="styled-select">
                        <option value="">Select prep time</option>
                        <option value="minimal">Minimal (5–10 min)</option>
                        <option value="standard">Standard (15–30 min)</option>
                        <option value="extensive">Extensive (45+ min)</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label">Cook?</label>
                    <select id="cookTime" class="styled-select">
                        <option value="">Select cook time</option>
                        <option value="minimal">Minimal (5–15 min)</option>
                        <option value="standard">Standard (20–45 min)</option>
                        <option value="extensive">Extensive (1+ hours)</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label">Servings?</label>
                    <select id="servings" class="styled-select">
                        <option value="">Select servings</option>
                        <option value="minimal">Minimal (1–2 ppl)</option>
                        <option value="standard">Standard (3–6 ppl)</option>
                        <option value="extensive">Extensive (8+ ppl)</option>
                    </select>
                </div>

                <div class="slide-footer">
                    <button class="next-btn" onclick="goNext()">Next</button>
                </div>
            </div>

            <!-- step 2: specifics -->
            <div class="slide">
                <h2 class="slide-title">Now with the specifics...</h2>
                <p class="slide-sub">Help others find your recipe</p>

                <div class="field-group">
                    <label class="field-label">Recipe Photo</label>
                    <label class="upload-card" for="recipePhoto">
                        <img id="previewImg" src="" alt="recipe preview">
                        <div class="upload-overlay">+</div>
                    </label>
                    <input type="file" id="recipePhoto" accept="image/*">
                </div>

                <div class="field-group">
                    <label class="field-label">Dietary Restrictions</label>
                    <select id="dietary" class="styled-select">
                        <option value="no-restriction" selected>No Restriction</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="pescatarian">Pescatarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="kosher">Kosher</option>
                        <option value="halal">Halal</option>
                        <option value="nut-free">Nut-free</option>
                        <option value="gluten-free">Gluten-free</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label">Meal Type</label>
                    <select id="mealType" class="styled-select">
                        <option value="">Select meal type</option>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="dessert">Dessert</option>
                    </select>
                </div>

                <div class="slide-footer">
                    <button class="back-btn" onclick="goBack()">Back</button>
                    <button class="next-btn" onclick="goNext()">Next</button>
                </div>
            </div>

            <!-- step 3: ingredients -->
            <div class="slide">
                <h2 class="slide-title">Then to the ingredients...</h2>
                <p class="slide-sub">Add each ingredient one by one</p>

                <div class="add-row">
                    <input type="text" id="ingredientInput" placeholder="Enter ingredient...">
                    <button type="button" class="add-btn" onclick="addIngredient()">Add</button>
                </div>

                <div class="item-box" id="ingredientList">
                    <p class="empty-hint">No ingredients added yet</p>
                </div>

                <div class="slide-footer">
                    <button class="back-btn" onclick="goBack()">Back</button>
                    <button class="next-btn" onclick="goNext()">Next</button>
                </div>
            </div>
            <!-- step 4: steps -->
            <div class="slide">
                <h2 class="slide-title">And finally, the steps...</h2>
                <p class="slide-sub">Walk through each step of your recipe</p>

                <div id="stepsContainer"></div>

                <button type="button" class="add-step-btn" onclick="addStep()">+ Add Step</button>

                <div class="slide-footer">
                    <button class="back-btn" onclick="goBack()">Back</button>
                    <button class="next-btn save-btn" onclick="saveRecipe()">Save Recipe</button>
                </div>
            </div>

        </div>
        </div>
    </div>
</main>
<script src="/static/js/instruction.js"></script>
</body>
</html>
