<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Plated</title>
  <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
</head>
<body>
  <div class="top-bar"></div>

  <main class="auth-container">

    <div class="auth-card">

      <div class="brand">
        <img src="/static/media/ratingimages/fullplate.png" alt="Plated logo">
        <span>Plated</span>
      </div>
      <h2 class="auth-title">Create Account</h2>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <p class="auth-error">{{ messages[0] }}</p>
        {% endif %}
      {% endwith %}

      <form class="auth-form" action="/register" method="POST">

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" maxlength="20" required>
          <span class="field-hint">Max 20 characters.</span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Choose a password" minlength="8" maxlength="72" required>
          <span class="field-hint">Between 8 and 72 characters.</span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" minlength="8" maxlength="72" required>
        </div>

        <button type="submit" class="auth-button">Create Account</button>
      </form>

      
      <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
    </div>

  </main>

</body>
</html>
